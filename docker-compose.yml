services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # Ép tên Container khi chạy
    container_name:
      voice_to_voice-backend
      # Ép tên Image đóng gói (Thay "tientho201" bằng username Docker Hub của bạn)
    image: tho201/voice_to_voice-backend:latest

    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Ép tên Container khi chạy
    container_name: voice_to_voice-frontend
    # Ép tên Image đóng gói
    image: tho201/voice_to_voice-frontend:latest

    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000 # API URL cho frontend gọi tới backend trong mạng docker
    env_file:
      - .env
    depends_on:
      - backend
    restart: always
